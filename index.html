        const siteList = document.getElementById('site-list');
        const emptyMessage = document.getElementById('empty-message');

        function renderSites() {
            siteList.innerHTML = '';
            if (sites.length === 0) {
                emptyMessage.classList.remove('hidden');
            } else {
                emptyMessage.classList.add('hidden');
                sites.forEach(site => {
                    const siteCard = document.createElement('div');
                    siteCard.className = 'bg-slate-800 rounded-lg shadow-md p-5 flex flex-col justify-between transition transform hover:-translate-y-1 hover:shadow-cyan-500/20';
                    siteCard.innerHTML = `
                        <div>
                            <h3 class="text-xl font-bold text-cyan-400 truncate">${site.name}</h3>
                            <p class="text-slate-400 text-sm break-words mb-4">${site.url}</p>
                        </div>
                        <a href="${site.url}" target="_blank" class="w-full text-center bg-slate-700 hover:bg-cyan-500 hover:text-slate-900 text-cyan-300 font-semibold py-2 px-4 rounded-md transition duration-300">Open ▶️</a>
                    `;
                    siteList.appendChild(siteCard);
                });
            }
        }
